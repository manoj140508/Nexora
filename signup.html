<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Nexora Sign Up</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:
linear-gradient(
180deg,
#0f172a,
#111827,
#1e1b4b
);
overflow:hidden;
}

.glow{
position:absolute;
width:400px;
height:400px;
background:#7c3aed;
filter:blur(150px);
opacity:.2;
left:-100px;
top:-100px;
border-radius:50%;
}

.glow2{
position:absolute;
width:400px;
height:400px;
background:#2563eb;
filter:blur(150px);
opacity:.2;
right:-100px;
bottom:-100px;
border-radius:50%;
}

.signup-card{

position:relative;

width:450px;

padding:40px;

background:
rgba(255,255,255,.05);

backdrop-filter:blur(15px);

border:
1px solid rgba(255,255,255,.08);

border-radius:30px;

text-align:center;

color:white;

box-shadow:
0 20px 50px rgba(0,0,0,.3);

}

.logo{

font-size:42px;

font-weight:800;

background:
linear-gradient(
90deg,
#a855f7,
#3b82f6
);

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

margin-bottom:15px;

}

.subtitle{

color:#cbd5e1;

margin-bottom:25px;

}

input{

width:100%;

padding:15px;

margin-bottom:15px;

border:none;

outline:none;

border-radius:15px;

background:
rgba(255,255,255,.08);

color:white;

}

input::placeholder{
color:#cbd5e1;
}

.signup-btn{

width:100%;

padding:15px;

border:none;

border-radius:15px;

font-size:16px;

font-weight:600;

cursor:pointer;

background:
linear-gradient(
135deg,
#7c3aed,
#2563eb
);

color:white;

margin-top:10px;

}

.signup-link{

margin-top:20px;

color:#cbd5e1;

}

.signup-link a{

color:#a855f7;

text-decoration:none;

font-weight:600;

}

</style>

</head>

<body>

<div class="glow"></div>
<div class="glow2"></div>

<div class="signup-card">

<div class="logo">

NEXORA

</div>

<p class="subtitle">

Create your Nexora account

</p>

<input
type="text"
id="name"
placeholder="Full Name">

<input
type="email"
id="email"
placeholder="Email">

<input
type="text"
id="userid"
placeholder="User ID">

<input
type="password"
id="password"
placeholder="Password">

<input
type="password"
id="confirmPassword"
placeholder="Confirm Password">

<button
class="signup-btn"
onclick="signup()">

Create Account

</button>

<div class="signup-link">

Already have an account?

<a href="login.html">

Login

</a>

</div>

</div>

<script>

function signup(){

let name =
document.getElementById("name").value;

let email =
document.getElementById("email").value;

let userid =
document.getElementById("userid").value;

let password =
document.getElementById("password").value;

let confirmPassword =
document.getElementById("confirmPassword").value;

if(
name === "" ||
email === "" ||
userid === "" ||
password === "" ||
confirmPassword === ""
){
alert("Please fill all fields");
return;
}

if(password !== confirmPassword){
alert("Passwords do not match");
return;
}

let user = {

name:name,
email:email,
userid:userid,
password:password

};

localStorage.setItem(
"user",
JSON.stringify(user)
);

alert("Account Created Successfully");

window.location.href =
"login.html";

}

</script>

</body>

</html>
